services:
  webui-backend:
    image: dev:latest
    container_name: webui-backend
    working_dir: /workspace/web
    command: >
      sh -c "uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    environment:
      PYTHONPATH: /workspace/projects/dsetkit/src
    volumes:
      - ./:/workspace/web
      - D:/works/projects/dsetkit/:/workspace/projects/dsetkit/:ro
      - D:/works/projects/00_datasets/:/workspace/projects/00_datasets/
    ports:
      - "8000:8000"
    restart: unless-stopped

  webui-frontend:
    image: webui-frontend:latest
    container_name: webui-frontend
    build:
      context: ./frontend
      args:
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-docker.m.daocloud.io/library}
    depends_on:
      - webui-backend
    ports:
      - "5173:80"
    restart: unless-stopped
